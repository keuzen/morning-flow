<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="頭を使わずに朝のルーティンをこなす - Morning Flow">
  <title>Morning Flow - 朝ルーティンアプリ</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">

    <!-- ============================== -->
    <!-- Home Screen                    -->
    <!-- ============================== -->
    <div class="screen" id="homeScreen">
      <div class="home-content">
        <!-- Floating particles background -->
        <div class="home-particles">
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
        </div>

        <div class="home-hero">
          <div class="home-icon">☀️</div>
          <h1 class="home-title">Morning Flow</h1>
          <p class="home-subtitle">頭を使わずに、朝をスムーズに</p>
        </div>

        <!-- Quick routine preview -->
        <div class="home-preview" id="homePreview">
          <div class="home-preview-label">今日のルーティン</div>
          <div class="home-preview-steps" id="homePreviewSteps">
            <!-- rendered dynamically -->
          </div>
          <div class="home-preview-total" id="homePreviewTotal"></div>
        </div>

        <div class="home-actions">
          <button class="home-start-btn" id="homeStartBtn">
            <span class="home-start-text">スタート</span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
          <button class="home-edit-btn" id="homeEditBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <span>ルーティンを編集</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ============================== -->
    <!-- Routine Screen                 -->
    <!-- ============================== -->
    <div class="screen hidden" id="routineScreen">
      <!-- Progress Bar -->
      <header class="header">
        <div class="header-row">
          <button class="header-home-btn" id="routineHomeBtn" title="ホームに戻る">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
          </button>
          <div class="progress-text">
            <span id="currentStepNum">1</span> / <span id="totalSteps">8</span>
          </div>
          <div class="header-spacer"></div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </header>

      <!-- Main Step Display -->
      <main class="step-display" id="stepDisplay">
        <div class="step-card">
          <div class="step-emoji" id="stepEmoji">🌅</div>
          <h1 class="step-title" id="stepTitle">カーテンを開ける</h1>
          <p class="step-tip" id="stepTip">朝日を浴びると目が覚めます</p>

          <!-- Timer -->
          <div class="timer-container">
            <div class="timer-ring">
              <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-bg" cx="50" cy="50" r="45" />
                <circle class="timer-progress" id="timerProgress" cx="50" cy="50" r="45" />
              </svg>
              <div class="timer-text" id="timerText">1:00</div>
            </div>
          </div>
        </div>
      </main>

      <!-- Completion Screen -->
      <main class="completion-screen" id="completionScreen">
        <div class="completion-content">
          <div class="completion-emoji">🎉</div>
          <h1 class="completion-title">おつかれさま！</h1>
          <p class="completion-message">今日も良い1日になりますように</p>
          <div class="completion-stats">
            <div class="stat-item">
              <span class="stat-value" id="totalTime">--:--</span>
              <span class="stat-label">かかった時間</span>
            </div>
          </div>
          <button class="restart-btn" id="restartBtn">ホームに戻る</button>
        </div>
      </main>

      <!-- Navigation -->
      <nav class="nav-buttons">
        <button class="nav-btn nav-btn-prev" id="prevBtn" disabled>
          <span class="nav-icon">←</span>
          <span class="nav-label">戻る</span>
        </button>
        <button class="nav-btn nav-btn-next" id="nextBtn">
          <span class="nav-label">次へ</span>
          <span class="nav-icon">→</span>
        </button>
      </nav>
    </div>

    <!-- ============================== -->
    <!-- Editor Screen                  -->
    <!-- ============================== -->
    <div class="screen hidden" id="editorScreen">
      <header class="editor-header">
        <button class="editor-back-btn" id="editorBackBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
          <span>戻る</span>
        </button>
        <h2 class="editor-title">ルーティン編集</h2>
        <button class="editor-reset-btn" id="editorResetBtn" title="初期状態に戻す">リセット</button>
      </header>

      <div class="editor-list" id="editorList">
        <!-- Items rendered dynamically -->
      </div>

      <button class="editor-add-btn" id="editorAddBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span>ステップを追加</span>
      </button>
    </div>

    <!-- ============================== -->
    <!-- Item Edit Modal                -->
    <!-- ============================== -->
    <div class="modal-overlay hidden" id="editModal">
      <div class="modal">
        <h3 class="modal-title" id="modalTitle">ステップを編集</h3>
        <div class="modal-field">
          <label for="modalEmoji">絵文字</label>
          <input type="text" id="modalEmoji" class="modal-input modal-input-emoji" maxlength="4" placeholder="⭐">
        </div>
        <div class="modal-field">
          <label for="modalStepTitle">タイトル</label>
          <input type="text" id="modalStepTitle" class="modal-input" maxlength="30" placeholder="カーテンを開ける">
        </div>
        <div class="modal-field">
          <label for="modalTip">ヒント</label>
          <input type="text" id="modalTip" class="modal-input" maxlength="50" placeholder="朝日を浴びると目が覚めます">
        </div>
        <div class="modal-field">
          <label for="modalDuration">所要時間（分）</label>
          <input type="number" id="modalDuration" class="modal-input" min="0" max="60" step="0.5" placeholder="1">
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" id="modalCancel">キャンセル</button>
          <button class="modal-btn modal-btn-save" id="modalSave">保存</button>
        </div>
      </div>
    </div>

  </div>

  <script src="scripts/app.js"></script>
</body>

</html>
